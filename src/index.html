<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; media-src 'self' blob: data:; connect-src https: http:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CherryPilot</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-mode="expanded" data-theme="dark" data-dock-side="right" data-revealed="false" data-docked="false" data-answer-zoomed="false" data-has-screenshot="false">
    <section class="compact-shell" id="compactShell" aria-label="CherryPilot">
      <div class="compact-agent-zone">
        <button class="agent-icon" id="agentIcon" title="单击展开，双击打开主页面" aria-label="CherryPilot">
          <svg class="agent-mark" viewBox="0 0 48 48" aria-hidden="true">
            <g class="pixel-mark pixel-cherry-mark">
              <rect class="pixel-stem" x="28" y="6" width="4" height="6" />
              <rect class="pixel-stem" x="24" y="12" width="4" height="6" />
              <rect class="pixel-leaf-dark" x="14" y="10" width="14" height="6" />
              <rect class="pixel-leaf-mid" x="10" y="16" width="14" height="6" />
              <rect class="pixel-leaf" x="14" y="22" width="8" height="4" />
              <rect class="pixel-cherry-dark" x="18" y="20" width="14" height="22" />
              <rect class="pixel-cherry-dark" x="14" y="24" width="22" height="16" />
              <rect class="pixel-cherry-dark" x="12" y="30" width="26" height="8" />
              <rect class="pixel-cherry-mid" x="16" y="26" width="18" height="14" />
              <rect class="pixel-cherry-mid" x="14" y="30" width="22" height="6" />
              <rect class="pixel-cherry" x="20" y="26" width="10" height="12" />
              <rect class="pixel-cherry" x="18" y="30" width="14" height="6" />
              <rect class="pixel-shine" x="18" y="28" width="6" height="6" />
              <rect class="pixel-shadow" x="20" y="40" width="12" height="4" />
            </g>
          </svg>
          <span class="status-dot"></span>
        </button>
        <div class="compact-orbit" aria-hidden="false">
          <button class="compact-action" id="compactModelButton" title="Switch model" aria-label="Switch model">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3 4 7l8 4 8-4z" />
              <path d="M4 12l8 4 8-4M4 17l8 4 8-4" />
            </svg>
          </button>
          <button class="compact-action" id="compactShotButton" title="区域截图 Ctrl+~" aria-label="区域截图">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 8h4l2-3h4l2 3h4v11H4z" />
              <circle cx="12" cy="13" r="3.4" />
            </svg>
          </button>
          <button class="compact-action" id="compactFileButton" title="添加文档" aria-label="添加文档">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" />
              <path d="M14 3v5h5M12 12v5M9.5 14.5H14.5" />
            </svg>
          </button>
          <button class="compact-action" id="compactMicButton" title="Voice input" aria-label="Voice input">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z" />
              <path d="M5 11a7 7 0 0 0 14 0M12 18v3M9 21h6" />
            </svg>
          </button>
          <button class="compact-action" id="compactOpenButton" title="打开主界面" aria-label="打开主界面">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2 3-.2-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21h-3.4v-.2a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.9.3l-.2.1-2-3 .1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H4v-3.4h.2a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1 2-3 .2.1a1.7 1.7 0 0 0 1.9.3 1.7 1.7 0 0 0 1-1.5V3h3.4v.2a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.2-.1 2 3-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.5 1h.2v3.4h-.2a1.7 1.7 0 0 0-1.5 1z" />
            </svg>
          </button>
          <button class="compact-action compact-context-action" id="compactExitButton" title="Exit CherryPilot" aria-label="Exit CherryPilot">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v9M6.6 6.8a8 8 0 1 0 10.8 0" />
            </svg>
          </button>
        </div>
      </div>

      <div class="compact-tools" id="compactTools">
        <div class="compact-topline" hidden>
          <span class="compact-context" id="compactContextStatus">无上下文</span>
        </div>
        <div class="compact-input-row">
          <input id="compactPromptInput" type="text" spellcheck="false" placeholder="直接提问..." />
          <button class="compact-send" id="compactSendButton" title="发送" aria-label="发送">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M22 2 11 13M22 2l-7 20-4-9-9-4z" />
            </svg>
          </button>
          <button class="compact-history-button" id="compactHistoryButton" title="History" aria-label="History">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 5v5h5" />
              <path d="M5.4 15a7 7 0 1 0 1-7.4L4 10" />
              <path d="M12 8v5l3 2" />
            </svg>
          </button>
        </div>
        <div class="compact-screenshot-strip" id="compactScreenshotStrip" hidden>
          <button class="compact-screenshot-thumb" id="compactScreenshotPreviewButton" title="预览截图" aria-label="预览截图">
            <img id="compactScreenshotThumb" alt="截图预览" />
            <span>截图</span>
          </button>
          <button class="compact-screenshot-delete" id="compactScreenshotDeleteButton" title="删除截图" aria-label="删除截图">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18M8 6V4h8v2M7 6l1 15h8l1-15" />
            </svg>
          </button>
        </div>
        <div class="compact-model-panel" id="compactModelPanel" hidden></div>
        <div class="compact-history-panel" id="compactHistoryPanel" hidden>
          <div class="panel-row">
            <h2>History</h2>
            <button class="ghost-button" id="clearHistoryButton" title="Clear history" aria-label="Clear history">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18M8 6V4h8v2M7 6l1 15h8l1-15" />
              </svg>
              <span>Clear</span>
            </button>
          </div>
          <div class="history-list" id="historyList"></div>
        </div>
        <button class="answer-expand-button" id="compactAnswerExpandButton" title="Expand answer" aria-label="Expand answer">
          <svg class="expand-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 3H3v5M16 21h5v-5M3 3l7 7M21 21l-7-7" />
          </svg>
          <svg class="restore-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10 3v5H5M14 21v-5h5M5 8l5-5M19 16l-5 5" />
          </svg>
        </button>
        <div class="compact-answer" id="compactAnswerBox">等待提问</div>
        <div class="compact-screenshot-preview" id="compactScreenshotPreviewPanel" hidden>
          <div class="compact-screenshot-preview-bar">
            <strong>截图预览</strong>
            <div>
              <button class="history-icon-button" id="compactScreenshotPreviewDeleteButton" title="删除截图" aria-label="删除截图">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 6h18M8 6V4h8v2M7 6l1 15h8l1-15" />
                </svg>
              </button>
              <button class="history-icon-button" id="compactScreenshotPreviewCloseButton" title="关闭预览" aria-label="关闭预览">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M6 6l12 12M18 6 6 18" />
                </svg>
              </button>
            </div>
          </div>
          <img id="compactScreenshotPreviewImage" alt="截图预览" />
        </div>
      </div>
    </section>

    <div class="app-shell">
      <header class="titlebar">
        <div class="window-brand">
          <svg class="brand-mark" viewBox="0 0 48 48" aria-hidden="true">
            <g class="pixel-mark pixel-cherry-mark">
              <rect class="pixel-stem" x="28" y="6" width="4" height="6" />
              <rect class="pixel-stem" x="24" y="12" width="4" height="6" />
              <rect class="pixel-leaf-dark" x="14" y="10" width="14" height="6" />
              <rect class="pixel-leaf-mid" x="10" y="16" width="14" height="6" />
              <rect class="pixel-leaf" x="14" y="22" width="8" height="4" />
              <rect class="pixel-cherry-dark" x="18" y="20" width="14" height="22" />
              <rect class="pixel-cherry-dark" x="14" y="24" width="22" height="16" />
              <rect class="pixel-cherry-dark" x="12" y="30" width="26" height="8" />
              <rect class="pixel-cherry-mid" x="16" y="26" width="18" height="14" />
              <rect class="pixel-cherry-mid" x="14" y="30" width="22" height="6" />
              <rect class="pixel-cherry" x="20" y="26" width="10" height="12" />
              <rect class="pixel-cherry" x="18" y="30" width="14" height="6" />
              <rect class="pixel-shine" x="18" y="28" width="6" height="6" />
              <rect class="pixel-shadow" x="20" y="40" width="12" height="4" />
            </g>
          </svg>
          <div class="brand-copy">
            <strong>CherryPilot</strong>
            <span><i></i> Settings</span>
          </div>
        </div>
        <div class="window-actions">
          <button class="icon-button" id="collapseButton" title="收起为图标" aria-label="收起为图标">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 3H3v5M16 21h5v-5M3 3l7 7M21 21l-7-7" />
            </svg>
          </button>
          <button class="icon-button is-active" id="pinButton" title="置顶" aria-label="置顶">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 17v5M5 4l5 5M19 4l-5 5M7 9h10l1 6H6z" />
            </svg>
          </button>
          <button class="icon-button" id="minimizeButton" title="最小化" aria-label="最小化">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12h14" />
            </svg>
          </button>
          <button class="icon-button danger" id="closeButton" title="关闭" aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6l12 12M18 6 6 18" />
            </svg>
          </button>
        </div>
      </header>

      <main class="workspace settings-workspace">
        <section class="settings-panel panel">
          <div class="panel-row">
            <h2>接口</h2>
            <span class="status-text" id="settingsStatus">等待 API Key</span>
          </div>
          <div class="theme-switch" id="themeSwitch" aria-label="Theme">
            <button class="theme-choice is-active" id="themeDarkButton" type="button">Dark</button>
            <button class="theme-choice" id="themeLightButton" type="button">Light</button>
          </div>
          <div class="provider-stack">
            <section class="provider-card" data-provider="0">
              <div class="provider-head">
                <strong>01 接口</strong>
                <span>Key / URL / 模型</span>
              </div>
              <label class="field">
                <span>API Key</span>
                <input id="apiKeyInput" type="password" spellcheck="false" autocomplete="off" placeholder="sk-..." />
              </label>
              <div class="field-grid">
                <label class="field">
                  <span>接口地址</span>
                  <input id="baseUrlInput" type="url" spellcheck="false" autocomplete="off" placeholder="https://api.openai.com/v1" />
                </label>
                <label class="field">
                  <span>模型</span>
                  <div class="model-picker">
                    <div class="model-combo" id="modelCombo">
                      <input id="modelInput" type="text" spellcheck="false" autocomplete="off" placeholder="gpt-4o-mini" />
                      <button class="field-icon-button" id="modelMenuButton" title="选择模型" aria-label="选择模型">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                          <path d="m6 9 6 6 6-6" />
                        </svg>
                      </button>
                      <div class="model-menu" id="modelMenu">
                        <div class="model-empty">刷新后选择模型</div>
                      </div>
                    </div>
                    <button class="field-icon-button" id="refreshModelsButton" title="刷新模型" aria-label="刷新模型">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M20 11a8 8 0 0 0-14-5l-2 3M4 4v5h5M4 13a8 8 0 0 0 14 5l2-3M20 20v-5h-5" />
                      </svg>
                    </button>
                  </div>
                </label>
              </div>
            </section>

            <section class="provider-card" data-provider="1">
              <div class="provider-head">
                <strong>02 接口</strong>
                <span>Key / URL / 模型</span>
              </div>
              <label class="field">
                <span>API Key</span>
                <input id="imageApiKeyInput" type="password" spellcheck="false" autocomplete="off" placeholder="sk-..." />
              </label>
              <div class="field-grid">
                <label class="field">
                  <span>接口地址</span>
                  <input id="imageBaseUrlInput" type="url" spellcheck="false" autocomplete="off" placeholder="https://api.openai.com/v1" />
                </label>
                <label class="field">
                  <span>模型</span>
                  <div class="model-picker">
                    <div class="model-combo" id="imageModelCombo">
                  <input id="imageModelInput" type="text" spellcheck="false" autocomplete="off" placeholder="model id" />
                      <button class="field-icon-button" id="imageModelMenuButton" title="选择模型" aria-label="选择模型">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                          <path d="m6 9 6 6 6-6" />
                        </svg>
                      </button>
                      <div class="model-menu" id="imageModelMenu">
                        <div class="model-empty">刷新后选择模型</div>
                      </div>
                    </div>
                    <button class="field-icon-button" id="imageRefreshModelsButton" title="刷新模型" aria-label="刷新模型">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M20 11a8 8 0 0 0-14-5l-2 3M4 4v5h5M4 13a8 8 0 0 0 14 5l2-3M20 20v-5h-5" />
                      </svg>
                    </button>
                  </div>
                </label>
              </div>
            </section>

            <section class="provider-card" data-provider="2">
              <div class="provider-head">
                <strong>03 接口</strong>
                <span>Key / URL / 模型</span>
              </div>
              <label class="field">
                <span>API Key</span>
                <input id="claudeApiKeyInput" type="password" spellcheck="false" autocomplete="off" placeholder="sk-..." />
              </label>
              <div class="field-grid">
                <label class="field">
                  <span>接口地址</span>
                  <input id="claudeBaseUrlInput" type="url" spellcheck="false" autocomplete="off" placeholder="https://api.openai.com/v1" />
                </label>
                <label class="field">
                  <span>模型</span>
                  <div class="model-picker">
                    <div class="model-combo" id="claudeModelCombo">
                      <input id="claudeModelInput" type="text" spellcheck="false" autocomplete="off" placeholder="model id" />
                      <button class="field-icon-button" id="claudeModelMenuButton" title="选择模型" aria-label="选择模型">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                          <path d="m6 9 6 6 6-6" />
                        </svg>
                      </button>
                      <div class="model-menu" id="claudeModelMenu">
                        <div class="model-empty">刷新后选择模型</div>
                      </div>
                    </div>
                    <button class="field-icon-button" id="claudeRefreshModelsButton" title="刷新模型" aria-label="刷新模型">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M20 11a8 8 0 0 0-14-5l-2 3M4 4v5h5M4 13a8 8 0 0 0 14 5l2-3M20 20v-5h-5" />
                      </svg>
                    </button>
                  </div>
                </label>
              </div>
            </section>

            <section class="provider-card local-provider-card" data-provider="3">
              <div class="provider-head">
                <strong>本地模型</strong>
                <span>Ollama / LM Studio</span>
              </div>
              <label class="field">
                <span>API Key</span>
                <input id="localApiKeyInput" type="password" spellcheck="false" autocomplete="off" placeholder="本地服务通常留空" />
              </label>
              <div class="field-grid">
                <label class="field">
                  <span>接口地址</span>
                  <input id="localBaseUrlInput" type="url" spellcheck="false" autocomplete="off" placeholder="http://127.0.0.1:11434/v1" />
                </label>
                <label class="field">
                  <span>模型</span>
                  <div class="model-picker">
                    <div class="model-combo" id="localModelCombo">
                      <input id="localModelInput" type="text" spellcheck="false" autocomplete="off" placeholder="qwen2.5:7b" />
                      <button class="field-icon-button" id="localModelMenuButton" title="选择本地模型" aria-label="选择本地模型">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                          <path d="m6 9 6 6 6-6" />
                        </svg>
                      </button>
                      <div class="model-menu" id="localModelMenu">
                        <div class="model-empty">刷新后选择本地模型</div>
                      </div>
                    </div>
                    <button class="field-icon-button" id="localRefreshModelsButton" title="刷新本地模型" aria-label="刷新本地模型">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M20 11a8 8 0 0 0-14-5l-2 3M4 4v5h5M4 13a8 8 0 0 0 14 5l2-3M20 20v-5h-5" />
                      </svg>
                    </button>
                  </div>
                </label>
              </div>
            </section>
          </div>
          <section class="permission-card">
            <div class="provider-head">
              <strong>工作文件夹</strong>
              <span id="workspaceAccessStatus">未授权</span>
            </div>
            <div class="permission-workspace">
              <label class="field">
                <span>AI 可操作目录</span>
                <input id="workspaceRootInput" type="text" spellcheck="false" autocomplete="off" readonly placeholder="选择文件夹即授权 AI 在其中工作" />
              </label>
              <button class="field-icon-button" id="chooseWorkspaceButton" type="button" title="选择并授权工作文件夹" aria-label="选择并授权工作文件夹">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 7h6l2 2h10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                  <path d="M3 7v11" />
                </svg>
              </button>
            </div>
            <div class="permission-actions">
              <button class="permission-link-button" id="clearWorkspaceButton" type="button">取消授权</button>
            </div>
            <label class="permission-toggle">
              <input id="commandAccessToggle" type="checkbox" />
              <span>允许 AI 在该文件夹内运行调试、构建和发布命令</span>
            </label>
          </section>
          <section class="system-card">
            <div class="provider-head">
              <strong>系统</strong>
              <span id="startupLaunchStatus">未开启</span>
            </div>
            <label class="permission-toggle">
              <input id="startupLaunchToggle" type="checkbox" />
              <span>开机自启 CherryPilot</span>
            </label>
            <label class="permission-toggle">
              <input id="lowCpuModeToggle" type="checkbox" checked />
              <span>低 CPU 模式</span>
            </label>
          </section>
          <section class="lan-card">
            <div class="provider-head">
              <strong>局域网共享</strong>
              <span id="lanShareStatus">未开启</span>
            </div>
            <label class="permission-toggle">
              <input id="lanShareToggle" type="checkbox" />
              <span>允许同一局域网设备发送资料</span>
            </label>
            <div class="lan-share-url" id="lanShareUrl">开启后显示访问地址</div>
          </section>
          <section class="guide-card">
            <div class="provider-head">
              <strong>使用说明</strong>
              <div class="guide-tabs" aria-label="Guide language">
                <button class="guide-tab is-active" type="button" data-guide-lang="zh">中文</button>
                <button class="guide-tab" type="button" data-guide-lang="en">EN</button>
                <button class="guide-tab" type="button" data-guide-lang="ja">日本語</button>
              </div>
            </div>
            <div class="guide-body" id="guideBody"></div>
          </section>
          <button class="command-button quiet" id="saveSettingsButton">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 5a2 2 0 0 1 2-2h10l4 4v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zM8 3v6h8V4M8 21v-7h8v7" />
            </svg>
            <span data-button-label>保存接口配置</span>
          </button>
        </section>

        <section class="history-panel panel main-history-panel" hidden>
          <div class="panel-row">
            <h2>历史询问</h2>
            <button class="ghost-button" id="clearHistoryButton" title="清空历史">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18M8 6V4h8v2M7 6l1 15h8l1-15" />
              </svg>
              <span>清空</span>
            </button>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>
      </main>
    </div>

    <input
      id="hiddenFileInput"
      type="file"
      multiple
      hidden
      accept=".pdf,.docx,.txt,.md,.markdown,.json,.csv,.log,.xml,.html,.css,.js,.ts,.py,.java,.cpp,.c,.h"
    />

    <script src="./mobile-companion.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
